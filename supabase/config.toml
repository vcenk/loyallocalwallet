# Supabase local config. Regenerate the canonical file any time with `supabase init`.
# `project_id` is a LOCAL identifier; the linked remote ref is stored by
# `supabase link` under supabase/.temp/ (gitignored), not here.
project_id = "local-loyalty-wallet"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Base URL of the dashboard; used for auth redirects in local dev.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
